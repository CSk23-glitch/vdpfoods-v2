server {
    listen 80;
    server_name videepthamdfoods.com www.videepthamdfoods.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name videepthamdfoods.com www.videepthamdfoods.com;

    # SSL Certificates mapped from the Host System
    ssl_certificate /etc/letsencrypt/live/videepthamdfoods.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/videepthamdfoods.com/privkey.pem;

    # Recommended Security Headers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy securely routing backend API calls behind SSL
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ensure backend Admin panel is also accessible under HTTPS
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
