version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_db
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=S_99_chi_231999
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Veediptha_Website-backend
    container_name: vdpfoods_backend
    restart: always
    environment:
      - DEBUG=True
      # Pass the authenticated MongoDB URI exactly how MongoEngine expects it
      - MONGODB_URI=mongodb://admin:S_99_chi_231999@mongodb:27017/?authSource=admin
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./website-frontend
    container_name: vdpfoods_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/vdpfoods-v2/certbot/conf:/etc/letsencrypt
    depends_on:
      - backend

volumes:
  mongo_data:
